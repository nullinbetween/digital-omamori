    // Split failure reasons. Online but the AI could not read it (large image 413 / safety block / incomplete fields) != offline, so no longer falsely claim "ネットが 必要".
    if(d&&d._reason==='ai'){
      const m2=ja?'この 写真（しゃしん）は 読（よ）めませんでした。文字（もじ）が はっきり 見（み）える ように、もう一度（いちど） 試（ため）して ください。':'Lens could not read this photo. Please try again with the text clear and well-lit.';
      return `<div class="lens-fail">${m2}</div>`;
    }
    // On a real offline / offline demo, do not dead-end; hand off gracefully to the offline layer (Emergency). Lens = online comprehension layer; Emergency/Local Pack = offline survival layer.
    const msg=ja
      ? 'レンズは、案内（あんない）や ラベルを 読（よ）むために ネットが 必要（ひつよう）です。ネットが なくても、緊急（きんきゅう）モードで、保存済（ほぞんず）みの 支援点（しえんてん）と 次（つぎ）に できる ことが 見（み）られます。'
      : 'Lens needs a connection to read signs and labels. Even without a network, Emergency Mode shows saved support points and what to do now.';
    const btn=ja?'⚠ 緊急（きんきゅう）モードを 開（ひら）く':'⚠ Open Emergency Mode';
    return `<div class="lens-fail">${msg}<button class="lens-fail-emer" onclick="App.openEmergency()">${btn}</button></div>`;
  }
  const brain=ja?(d.brain_ja||d.brain_en||''):(d.brain_en||d.brain_ja||'');
  const actionJa=d.action_ja||'';const actionEn=d.action_en||'';
  return `
    <div class="lens-raw"><div class="lens-rl">📷 ${ja?'読（よ）み取（と）った 文字（もじ）':'Scanned (original)'}</div><div class="lens-rt">${esc(d.raw_ja||'')}</div></div>
    <div class="lens-card brain"><div class="lens-cl">🧠 For My Brain</div><div class="lens-cc">${esc(brain)}</div></div>
    <div class="lens-card action"><div class="lens-cl">🤝 For My Action — やさしい日本語</div><div class="lens-cc big">${esc(actionJa)}</div>${(!ja&&actionEn)?`<div class="lens-cc-en">${esc(actionEn)}</div>`:''}</div>
    ${lensLocalData()}
    ${lensBringFromKit(d)}
    <div class="lens-honest">${ja?'AI が 読（よ）んで、やさしく まとめて います。大事（だいじ）な ことは、港区（みなとく）や 役所（やくしょ）の お知（し）らせも 見（み）て ください。':'Summarized by AI. For anything important, please also check the official notice.'}</div>`;
}

const App={
  setLang(l){state.lang=l;renderAll();},
  toggleAiDemo(){state.aiUnavailDemo=!state.aiUnavailDemo;renderAll();toast(state.aiUnavailDemo?(state.lang==='ja'?'オフラインモード：ON':'Offline mode: ON'):(state.lang==='ja'?'オフラインモード：OFF':'Offline mode: OFF'));},
  go(k){App.moreClose();if(state.tab==='lens'&&k!=='lens')this._lensStop();state.tab=k;renderMain();renderTabs();},
  moreToggle(){const m=document.getElementById('bnav-more'),sc=document.getElementById('bnav-scrim');if(!m)return;const open=m.style.display==='block';m.style.display=open?'none':'block';sc.style.display=open?'none':'block';},
  moreClose(){const m=document.getElementById('bnav-more'),sc=document.getElementById('bnav-scrim');if(m)m.style.display='none';if(sc)sc.style.display='none';},
  profToggle(k,open){state.profOpen[k]=open;},  // Profile collapsible sections: remember open/closed so a re-render (e.g. a stepper press) does not snap them shut

  kitQuery(v){state.kitFilter.query=v;renderMain();},
  kitCat(c){state.kitFilter.category=c;renderMain();},
  kitStatus(s){state.kitFilter.status=s;renderMain();},
  packQuery(v){state.packFilter.query=v;renderMain();},
  packType(ty){state.packFilter.type=ty;renderMain();},
  openAdd(){openModal(null);},
  openEdit(id){openModal(supplies().find(i=>i.item_id===id));},
  closeModal(){document.getElementById('modal-ov').classList.remove('show');},
  catChanged(){const c=document.getElementById('m-cat')?.value;const row=document.getElementById('m-exp-row');if(row)row.style.display=['water','food','medical','child','pet'].includes(c)?'':'none';App.matchName();},  // Changing category = layer 1 changed -> re-match within the category (pet added to the perishable set = フード has a 賞味期限)  // D1: only perishable categories (water/food/medicine/infant) show the 賞味期限
  updateQtyUnit(){  // The quantity field shows the unit from the matched rule (water = L, ...); water additionally gets a "total L" hint
    const cm=state.currentMatch;const rule=cm&&cm.matched_rule_id?catalog().find(r=>r.rule_id===cm.matched_rule_id):null;
    const jaU=rule&&rule.target?rule.target.unit:'';const enU=EN_UNIT[jaU]||jaU;
    const u=state.lang==='ja'?jaU:enU;const us=document.getElementById('m-qty-unit');if(us)us.textContent=u?`(${u})`:'';
    const h=document.getElementById('m-qty-hint');if(h)h.textContent=(rule&&rule.rule_id==='water')?(state.lang==='ja'?'ぜんぶで なんリットル？ 例：2L × 6本 = 12':'Total litres, e.g. 2L × 6 bottles = 12'):'';
  },
  matchName(){
    const cat=catalog();if(!cat.length)return;
    const scan={name_ja:document.getElementById('m-ja')?.value||'',name_en:document.getElementById('m-en')?.value||''};
    if(!scan.name_ja&&!scan.name_en){renderMatchBox();return;}  // Empty name -> leave the existing rule untouched (Q2: an empty name does not clear it)
    // Two-layer mechanism: category = layer 1 (user responsible; その他 = free zone, not matched); keyword = layer 2 (ranked within the category)
    const lock=document.getElementById('m-cat')?.value||null;
    const res=C.matchScanToRule(scan,cat,{categoryLock:lock});
    const cur=state.currentMatch;
    const hadRule=!!(cur&&cur.matched_rule_id&&!cur.needs_manual_confirm);
    const oldRule=hadRule?cat.find(r=>r.rule_id===cur.matched_rule_id):null;
    const oldFits=!!(oldRule&&(!lock||oldRule.category===lock));  // Q2 retention only when "the old rule is compatible with the current category"; if the user changes category = explicit intent, the old rule yields
    if(res.matched_rule_id&&!res.needs_manual_confirm){
      state.currentMatch=res;  // New name strong-match -> update matched_rule_id (same rule or a different one)
      const rule=cat.find(r=>r.rule_id===res.matched_rule_id);
      // No-harm/UX: auto-classification only carries the suggested target, **it does not overwrite the user's manually chosen category**. As-needed items leave the 目安 blank.
      if(rule){document.getElementById('m-tgt').value=rule.target&&rule.target.type==='per_household'?'':C.resolveTarget(rule,family()).value;}
    }else if(!hadRule||!oldFits){
      state.currentMatch=res;  // No rule before, or the old rule clashes with the user's chosen category -> accept the new result (-> extra / re-match within category)
    }// else: has a rule + ambiguous new name + compatible category -> keep the old rule (Q2 principle: do not silently clear)
    renderMatchBox();App.updateQtyUnit();
  },
  pickRule(rid){
    const rule=catalog().find(r=>r.rule_id===rid);if(!rule)return;
    state.currentMatch={matched_rule_id:rid,confidence:1,needs_manual_confirm:false,manual:true};
    document.getElementById('m-cat').value=rule.category;
    document.getElementById('m-tgt').value=C.resolveTarget(rule,family()).value;
    renderMatchBox();
  },
  addFromRule(rid){
    const rule=catalog().find(r=>r.rule_id===rid);if(!rule)return;
    const tgt=rule.target&&rule.target.type==='per_household'?'':C.resolveTarget(rule,family()).value;  // As-needed items (no official amount): do not preset the 目安 to 1, leave it blank
    openModal({name_ja:rule.name_ja,name_en:rule.name_en,category:rule.category,quantity:0,targetQuantity:tgt,expiryDate:'',storageLocation:''},{matchRule:rule});
  },
  pickStorage(loc){state.modal.storage=(state.modal.storage===loc)?'':loc;renderModalLocs();},
  addStorage(){const n=(prompt(t().prof.addPlacePrompt)||'').trim();if(!n)return;const f=family();f.storageLocations=f.storageLocations||[];if(!f.storageLocations.includes(n))f.storageLocations.push(n);saveSupply();state.modal.storage=n;renderModalLocs();},
  addStorageProfile(){const n=(prompt(t().prof.addPlacePrompt)||'').trim();if(!n)return;const f=family();f.storageLocations=f.storageLocations||[];if(!f.storageLocations.includes(n))f.storageLocations.push(n);saveSupply();renderMain();},
  delStorage(loc){const f=family();f.storageLocations=(f.storageLocations||[]).filter(x=>x!==loc);saveSupply();renderMain();},
  fam(k,d){const f=family();const min=(k==='targetDays')?1:0;f[k]=Math.max(min,(Number(f[k])||0)+d);saveSupply();renderMain();},
  async saveAddress(v){const ud=state.data.userDoc;if(!ud)return;ud.user_profile=ud.user_profile||{};ud.user_profile.address=v;await lsSet(LS.user,ud);toast(t().prof.saved);},
  togglePack(key){const ud=state.data.userDoc;if(!ud)return;ud.user_profile=ud.user_profile||{};const pc=ud.user_profile.pack_consent||{};pc[key]=!(pc[key]!==false);ud.user_profile.pack_consent=pc;lsSet(LS.user,ud);renderMain();},
  packAll(on){const ud=state.data.userDoc;if(!ud)return;ud.user_profile=ud.user_profile||{};const pc={};PACKS.forEach(p=>pc[p.key]=!!on);ud.user_profile.pack_consent=pc;lsSet(LS.user,ud);renderMain();},
  // Official pack update check (MVP: the pack is bundled locally and already current; a real cloud comparison would only happen when online. This just illustrates the UI flow.)
  checkPackUpdates(){
    const L=t();const btn=document.getElementById('p-pack-btn');const st=document.getElementById('p-pack-status');
    if(!btn||!st)return;const orig=btn.textContent;
    btn.disabled=true;btn.textContent=L.prof.packChecking;st.textContent='';
    setTimeout(()=>{
      btn.disabled=false;btn.textContent=orig;
      st.innerHTML='✅ '+esc(L.prof.packUpToDate)+' · '+esc(L.prof.packCheckedNow);
      applyRuby(st);toast(L.prof.packUpToDate);
    },650);
  },
  async setDemoLocation(arg){
    const q=(arg!==undefined?arg:(document.getElementById('p-address')?.value||'')).trim();
    if(!q)return;const norm=q.toLowerCase();
    const hit=demoLocs().find(d=>String(d.display_name).toLowerCase()===norm||(d.aliases||[]).some(a=>String(a).toLowerCase()===norm));
    const ud=state.data.userDoc;if(!ud)return;ud.user_profile=ud.user_profile||{};ud.user_profile.address=q;
    if(hit){ud.user_profile.coords={lat:hit.lat,lng:hit.lng};ud.user_profile.demo_location_name=hit.display_name;
      await lsSet(LS.user,ud);renderMain();toast(t().prof.demoSet+'：'+hit.display_name);}
    else{await lsSet(LS.user,ud);renderMain();toast(t().prof.demoNotFound);}
  },
  locate(){
    if(!('geolocation' in navigator)){toast(t().prof.geoNo);return;}
    toast(t().prof.geoWait);
    navigator.geolocation.getCurrentPosition(async(pos)=>{
      const ud=state.data.userDoc;if(!ud)return;ud.user_profile=ud.user_profile||{};
      ud.user_profile.coords={lat:pos.coords.latitude,lng:pos.coords.longitude};
      await lsSet(LS.user,ud);renderMain();toast(t().prof.geoOk);
    },function(){toast(t().prof.geoFail);},{enableHighAccuracy:true,timeout:10000});
  },
  async uploadPhoto(inp,suffix){const file=inp.files&&inp.files[0];if(!file)return;
    if(!/^image\/(png|jpeg)$/i.test(file.type||'')){toast(t().photoType);inp.value='';return;}  // Accept only jpg/png (block HEIC etc. up front; not sent to the server)
    const reader=new FileReader();reader.onload=()=>{const b64=reader.result;if(suffix==='label')state.modal.photoLabel=b64;else state.modal.photo=b64;const box=document.getElementById(suffix==='label'?'m-pbox-label':'m-pbox-front');if(box){box.classList.add('has');box.innerHTML=`<input type="file" accept="image/png,image/jpeg" onchange="App.uploadPhoto(this,'${suffix}')"><img src="${b64}">`;}toast(t().photoPreviewNote);};reader.readAsDataURL(file);},  // privacy: local preview only, no POST, not persisted (saveItem does not write base64 into localStorage)
  async saveItem(){
    const g=(id)=>document.getElementById(id)?.value||'';
    const cm=state.currentMatch||{};const id=state.modal.itemId;
    const it={item_id:id,name_en:g('m-en'),name_ja:g('m-ja'),category:g('m-cat'),
      quantity:Number(g('m-qty'))||0,targetQuantity:Number(g('m-tgt'))||0,expiryDate:g('m-exp')||null,
      storageLocation:state.modal.storage||'',store:g('m-buystore'),
      photo:(state.modal.photo&&!String(state.modal.photo).startsWith('data:'))?state.modal.photo:null,photoLabel:(state.modal.photoLabel&&!String(state.modal.photoLabel).startsWith('data:'))?state.modal.photoLabel:null,  // Privacy: freshly uploaded base64 is not persisted (session preview only); seed server paths are kept
      matched_rule_id:(cm.matched_rule_id&&!cm.needs_manual_confirm)?cm.matched_rule_id:null,match_confidence:cm.confidence||0,needs_manual_confirm:false,
      status:'',gap_reason_en:null,gap_reason_ja:null};
    const arr=supplies();const idx=arr.findIndex(i=>i.item_id===id);
    if(idx>=0)arr[idx]={...arr[idx],...it};else arr.push(it);
    await saveSupply();this.closeModal();renderMain();toast(t().prof.saved);
  },
  async delItem(){
    state.data.supplyDoc.supply_item=supplies().filter(i=>i.item_id!==state.editing);
    await saveSupply();this.closeModal();renderMain();toast(t().toastDeleted);
  },
  openEmergency(){openEmergency();},
  emerLang(l){state.lang=l;renderChrome();renderTabs();openEmergency();},
  closeEmergency(){document.getElementById('emergency').classList.remove('show');},
  openKuji(){openKuji();},
  closeKuji(){document.getElementById('kuji').classList.remove('show');},
  // ---- Lens: camera (mobile) / upload (desktop QA) -> /api/lens multimodal ----
  async lensCam(){
    try{
      _lensStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
      const v=document.getElementById('lens-video');v.srcObject=_lensStream;await v.play();
      v.style.display='block';const ph=document.getElementById('lens-ph');if(ph)ph.style.display='none';
      const stg=v.closest('.lens-stage');stg.classList.add('live','cam-on');/* cam-on = live video only (not photo preview) -> gates the overlaid mobile shutter */
      if(window.matchMedia('(max-width:640px)').matches)setTimeout(()=>stg.scrollIntoView({behavior:'smooth',block:'center'}),80);/* bring viewfinder + shutter into one screen */
      const pv=document.getElementById('lens-preview');if(pv)pv.style.display='none';
      document.getElementById('lens-cam').style.display='none';
      document.getElementById('lens-shoot').style.display='';
      // Native zoom: show the slider only when the capability reports zoom (iOS 17+ Safari / most Android Chrome)
      try{
        const track=_lensStream.getVideoTracks()[0];
        const caps=track.getCapabilities?track.getCapabilities():null;
        const zi=document.getElementById('lens-zoom');
        if(zi&&caps&&caps.zoom&&typeof caps.zoom.min==='number'){
          zi.min=caps.zoom.min;zi.max=caps.zoom.max;zi.step=caps.zoom.step||0.1;
          zi.value=(track.getSettings&&track.getSettings().zoom)||caps.zoom.min;
          zi.style.display='block';
          zi.oninput=()=>{track.applyConstraints({advanced:[{zoom:parseFloat(zi.value)}]}).catch(()=>{});};
        }else if(zi){zi.style.display='none';}
      }catch(e){/* zoom 非必要功能，失敗靜默 */}
    }catch(e){toast(state.lang==='ja'?'カメラが 使（つか）えません。アップロードを どうぞ':'Camera unavailable — use Upload');}
  },
  async lensShoot(){
    const v=document.getElementById('lens-video');if(!v||!v.videoWidth)return;
    const cv=document.createElement('canvas');cv.width=v.videoWidth;cv.height=v.videoHeight;
    cv.getContext('2d').drawImage(v,0,0);
    const dataUrl=cv.toDataURL('image/jpeg',0.85);
    this._lensStop();
    await this._lensRecognize(dataUrl,'image/jpeg');
  },
  lensFile(inp){
    const f=inp.files&&inp.files[0];if(!f)return;
    if(!/^image\/(png|jpeg)$/i.test(f.type||'')){toast('JPG / PNG only');inp.value='';return;}
    // Add a downscale step to the upload path (an AI-generated 11MB PNG -> exceeds the 8MB body cap -> 413 -> was misreported as "offline").
    // <=1600px + JPEG 0.85 = same quality as the camera path; also saves Gemini API payload.
    const reader=new FileReader();reader.onload=()=>{
      const img=new Image();
      img.onload=async()=>{
        const MAX=1600;const sc=Math.min(1,MAX/Math.max(img.width||1,img.height||1));
        if(sc<1||f.size>2*1024*1024){
          const cv=document.createElement('canvas');cv.width=Math.round((img.width||1)*sc);cv.height=Math.round((img.height||1)*sc);
          cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
          await this._lensRecognize(cv.toDataURL('image/jpeg',0.85),'image/jpeg');
        }else{await this._lensRecognize(reader.result,f.type);}
      };
      img.onerror=async()=>{await this._lensRecognize(reader.result,f.type);};
      img.src=reader.result;
    };
    reader.readAsDataURL(f);
  },
  async _lensRecognize(dataUrl,mime){
    const res=document.getElementById('lens-result');if(!res)return;
    // Show a preview: let the user see what they captured/uploaded
    const pv=document.getElementById('lens-preview');const ph=document.getElementById('lens-ph');
    if(pv){pv.src=dataUrl;pv.style.display='block';const st=pv.closest('.lens-stage');if(st){st.classList.add('live');if(window.matchMedia('(max-width:640px)').matches)setTimeout(()=>st.scrollIntoView({behavior:'smooth',block:'center'}),80);}}if(ph)ph.style.display='none';
    res.innerHTML=`<div class="lens-loading"><span class="lens-spin"></span>${state.lang==='ja'?'読（よ）み取（と）り中（ちゅう）…':'Reading…'}</div>`;applyRuby(res);
    let data=null;
    if(state.aiUnavailDemo){
      data={use_fallback:true,_reason:'demo'};  // Offline demo: skip the /api/lens call and hand off straight to the deterministic path
    }else{
      try{
        const r=await Promise.race([api('/api/lens','POST',{image:dataUrl,mime}),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),20000))]);
        data=r&&r.data;
      }catch(e){data={use_fallback:true,_reason:state.online?'ai':'offline'};}
      if(data&&data.use_fallback&&!data._reason)data._reason=state.online?'ai':'offline';
    }
    res.innerHTML=renderLensResult(data);applyRuby(res);
  },
  _lensStop(){
    if(_lensStream){_lensStream.getTracks().forEach(tr=>tr.stop());_lensStream=null;}
    const zi=document.getElementById('lens-zoom');if(zi)zi.style.display='none';
    const v=document.getElementById('lens-video');if(v){v.style.display='none';v.srcObject=null;}
    const ph=document.getElementById('lens-ph');if(ph)ph.style.display='';const pv2=document.getElementById('lens-preview');const st2=document.querySelector('.lens-stage');if(st2){st2.classList.remove('cam-on');if(!pv2||pv2.style.display==='none')st2.classList.remove('live');}
    const cam=document.getElementById('lens-cam');if(cam)cam.style.display='';
    const sh=document.getElementById('lens-shoot');if(sh)sh.style.display='none';
  },
};
window.App=App;

(async()=>{try{await loadAll();renderAll();}catch(e){document.getElementById('wrap').innerHTML='<div class="empty">Digital Omamori could not load. Please refresh or try again later.</div>';}})();
/* Real connection status: online/offline events -> update the connection pill + banner (reflects browser connectivity only, not whether Gemini/portal is available). */
window.addEventListener('online',()=>{state.online=true;renderChrome();renderMain();});
// Back-to-top button (the "All" list is very long, so scrolling back up needs help) — appears after scrolling past 600px
window.addEventListener('scroll',()=>{const b=document.getElementById('to-top');if(b)b.classList.toggle('show',window.scrollY>600);},{passive:true});
window.addEventListener('offline',()=>{state.online=false;renderChrome();renderMain();});
/* Prevent stale cached builds: actively clear any old SW + caches on load;
 * if an SW existed (may be serving an old page) -> reload once to fetch the latest from the server. sessionStorage guards against a reload loop. */
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    var had=regs.length>0;
    Promise.all(regs.map(function(r){return r.unregister();}))
      .then(function(){return window.caches?caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}):null;})
      .then(function(){ if(had && !sessionStorage.getItem('ps-sw-cleared')){ sessionStorage.setItem('ps-sw-cleared','1'); location.reload(); } });
  }).catch(function(){});
}
window.__PS_READY__=true;
