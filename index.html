<!doctype html>
<!--
  Digital Omamori — index.html (Prototype V11)
  Local-first disaster-prep app for foreign residents in Japan (English + easy Japanese).
  Version = Prototype V11 — a single product-iteration version (Hackathon-1 agent.py style:
  each major product/architecture/QA phase = one version; now 11th phase). No separate
  internal semver. Change history is
  date-stamped in CHANGELOG.md; the build-log notes below are kept as handoff history.

  Prototype V11 — Coverage-consistency + honest seed (2026-07-06):
    - First real-household inventory seed (22 photographed items across all categories,
      incl. 2 expired items for the rotation reminder) replaces the MUJI dummy; seed
      targetQuantity now computed via the app's own resolveTarget() (was hand-filled = quantity).
    - Today ring, disaster-omikuji %, and Ready Check % now all read the same household-coverage %
      (closed a trust gap: the kit "usable %" ignored sufficiency and could imply false safety).
    - UI/data layer only; no core.js / coverage-logic change. 108 tests + 13 vocab-lint + 19 dataflow.
  Prototype V10 — Mobile UX overhaul + language QA close-out (2026-07-03 → 07-05):
    - Bottom navigation on phones (4 thumb-reach slots + "More" panel); desktop keeps top tabs.
    - Emergency-app header pattern on mobile (centered brand, large Emergency button).
    - Language-independent layout anchors: EN ⇄ easy-Japanese switch no longer shifts the UI
      (ruby-inclusive line heights, per-slot tab widths, fixed control sizes).
    - Page-by-page copy QA completed (やさしい日本語 rulebook, vocab lint test suite).
    - "Offline mode" naming unified app-wide; front door = daily digest (Today's omamori).
    - Two-layer item classification (user-chosen category + in-category keywords);
      AED English names app-generated with ＊ labeling (official field never touched).
    - 108 tests + 10 vocab-lint + 19 privacy dataflow checks.
  Prototype V9 — Submission / credibility QA:
    - "Local guidance mode": app-level resilience state (not an error) — AI features pause,
      deterministic features keep working.
    - Internal rule-matching hidden from users -> plain-language "Counts toward Ready Check".
    - Safety guard: an empty water container is not drinking water (no false coverage).
    - Removed overclaims (official / auto-update / offline); Guide page rewritten.
    - Ready Check is the primary add-entry; Extra kit items separated; Babies/Pets gating;
      full Japanese furigana.
    - Privacy by design: public safety data served from Cloud Run; private household data
      (profile, saved places, inventory, readiness) kept in browser localStorage, never
      POSTed to the backend. Photos are session preview only.
    - Coverage integrity (2026-07-02): Ready Check counts only save-time classification;
      extra/ambiguous items never inflate readiness. Status pill honest-labeled
      ("Offline · simulated" during the offline demo; real connection otherwise). Live app clock.
      99 tests + 19 privacy dataflow checks.
  Prototype V8 — Rebrand to Digital Omamori + source trust:
    - Omamori (protective charm) concept + tagline "Turn everyday readiness into emergency action."
    - Pack consent + source-level badges (public guidance / common preparedness /
      household-specific) + citations.
  Prototype V7 — Lens multimodal:
    - Photograph / upload a Japanese notice -> native-language summary + easy-Japanese
      action, grounded on local hard data.
  Prototype V6 — Ready-Kuji (disaster omikuji) + full Gemini wiring:
    - google-genai + gemini-3.5-flash + service-account ADC.
    - Tier = real readiness % (deterministic) -> Gemini phrasing + 20-slip fallback.
  Prototype V5 — Inventory expansion + Profile calculator + Nearby view + Guide draft.
  Prototype V4 — Real official local pack:
    - All 311 Minato-ku facilities (shelters / AED / water stations, real coords) + GSI elevation.
  Prototype V3 — Recommendation / coverage engine (core.js §10):
    - Scan -> matched_rule + personalized target + Ready Check.
  Prototype V2 — Real management app:
    - server.py + JSON CRUD + PWA (offline shell); dropped the phone-frame demo.
  Prototype V1 — prototype skeleton:
    - Disaster-supply DB + Emergency decision cards + Prepare/Respond dual track.
  --- below: build-log history (kept for handoff; project uses a single Prototype V11 version + dated CHANGELOG) ---
  2026-07-02 (Prototype V9) — Privacy by design, architecture migration:
    - Private household data moved to browser localStorage (keys omamori_supply_v1 / omamori_user_v1).
      loadAll seeds from server GET on first empty load, then reads/writes localStorage only.
    - saveSupply / saveAddress / togglePack / setDemoLocation etc. no longer POST to Cloud Run.
    - Server private write endpoints removed (POST /api/supply·/api/user-profile·/api/photo, GET/POST /api/inventory);
      supply·user-profile remain read-only GET seed.
    - Photos: session preview only (base64 not persisted to localStorage or server); future = IndexedDB.
    - Ready-Kuji sends only coarse readiness tier to Gemini (no full gaps / percent) — data minimization.
    - Tests updated (dashboard smoke asserts localStorage; server smoke asserts private POST → 404). 97 green.
  v0.6 changes:
    - Local Pack -> 周辺ビュー Nearby View (summary + nearest shelter/AED card + static filter + rows instead of cards + bearing); Arial app-wide; official やさしい日本語 ruby (applyRuby renders 漢字（かな） -> <ruby>); language toggle inside Emergency; Kit status definition table; images restricted to jpg/png; demo address parsing; GPS demoted to a developer-only option.
  v0.5 changes:
    - store purchase-shop field (edit + card); STORED AT changed to button options (pick from the storage list + add new); photo front + label upload (/api/photo) + card thumbnail.
    - Added a Stock tab (restock fast-log: +1 / top-up -> add quantity + log entry, last restock / low gaps / recent activity).
    - Added a Profile tab (household size / days stepper = calculator -> Ready Check target updates live; add/remove storage locations; address placeholder kept local, not uploaded).
  v0.4 changes:
    - Added a Recommend tab (renderRecommend): official recommended list with personalized target vs actual stock -> covered/partial/missing + readiness % + progress bar + one-tap Add to kit.
    - Scan-to-register wired to the matching engine: scan -> matchScanToRule; strong features auto-classify, low confidence shows candidate chips requiring manual confirmation (renderMatchBox / matchName / pickRule).
    - Loads /api/catalog; saveItem writes matched_rule_id/confidence/needs_manual_confirm.
  v0.3: Kids-Meal-style responsive management dashboard (kit/pack/check tabs + filter + CRUD + Emergency offline card).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#D0CAE9">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="app/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="app/icon-192.png">
<title>Digital ✦ Omamori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --moon:#FBFBFE;--moon-2:#EEF0F7;--cloud:#FFFFFF;
  --ink:#3D4050;--ink-soft:#878BA1;--ink-faint:#B4B7C8;
  --platinum:#C7CCDA;--pearl:#ECEEF5;
  --line:rgba(150,156,186,0.24);--line-soft:rgba(150,156,186,0.14);
  --lav:#D0CAE9;--lav-deep:#9189C0;--sky:#CBDAEE;--sky-deep:#7B99C0;
  --rose:#EAD6DB;--rose-deep:#BE96A0;--gold:#E9DEC2;--gold-deep:#B49A63;
  /* Body text uses Arial (clarity matters for disaster info; Japanese falls back to Hiragino/Noto).
     Headings/brand/numbers use Inter 600-700 (UI-1 type hierarchy; Inter = highly legible UI font, keeps the clarity principle). */
  --serif:Arial,"Hiragino Sans","Noto Sans JP","PingFang TC",sans-serif;
  --display:"Inter",Arial,"Hiragino Sans","Noto Sans JP","PingFang TC",sans-serif;
  --sans:Arial,"Hiragino Sans","Noto Sans JP","PingFang TC",sans-serif;
  --num:"Inter",Arial,"Helvetica Neue",sans-serif;
  --shadow-soft:0 8px 40px rgba(130,135,170,0.10);
  --shadow-card:0 5px 24px rgba(130,135,170,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overflow-x:clip;}/* App-wide guard against horizontal overflow blowing out the viewport (clip creates no scroll container = safe for the sticky topbar; edge cases like long ruby atoms are clipped in place) */
body{font-family:var(--sans);color:var(--ink);font-size:14px;line-height:1.55;
  background:linear-gradient(180deg,var(--moon),var(--moon-2));min-height:100vh;}

/* top bar */
.topbar{position:sticky;top:0;z-index:20;background:rgba(251,251,254,0.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);}
.topbar-in{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.brand{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:2px;line-height:1;display:flex;align-items:center;gap:8px;}
/* UI-2 brand system: the 御守 (omamori) mark (lavender pouch + washi gold cord + ✦) = the convergence of the two-layer color language: cool lavender deterministic layer x warm washi AI layer */
.brand-mark{width:17px;height:auto;flex-shrink:0;}
.brand-t{background:linear-gradient(180deg,#5A5E72,#9AA0B6 55%,#D5D9E6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand .star{color:var(--lav-deep);-webkit-text-fill-color:var(--lav-deep);font-size:15px;vertical-align:4px;margin:0 4px;}
/* min-height set for JA ruby needs (the tagline has furigana) -> EN/JA same height, so the header divider does not float with language */
.brand-sub{font-family:var(--display);font-size:9.5px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;min-height:19px;display:flex;align-items:flex-end;}
.spacer{flex:1;}
/* Desktop reverts to a single row: brand + status light on the left; right group [offline demo, gray] -> [language] -> [Emergency = far-right corner, muscle-memory spot]. The two-row desktop variant was dropped. The mobile two-row structure lives in the @media block. */
.topbar-ctrls{display:flex;align-items:center;gap:16px;}
.topbar-ctrls .lang-toggle{order:9;margin-left:auto;}/* Order within ctrls: lg-pill first, toggle after (right next to the Emergency button) */
/* Connection pill moved next to the brand (semantics = app status light; it widens without pushing the right-side controls) */
.brand-row{display:flex;align-items:center;gap:12px;}
/* All topbar control heights are fixed (JA ruby cannot stretch them) -> divider position is language-independent */
/* The three ctrls share a fixed height of 38 (language toggle / lg-pill / Emergency button; the Emergency button's weight comes from red + shadow, not height) */
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:rgba(255,255,255,0.6);height:38px;}
.lang-toggle button{border:none;background:transparent;color:var(--ink-soft);font:600 11px var(--sans);padding:0 12px;height:100%;display:inline-flex;align-items:center;cursor:pointer;}
.lang-toggle button.on{background:var(--lav);color:#4A4470;}
/* Fixed width = EN "Emergency" / JA 緊急 render at the same button size, so switching language does not resize it (mobile QA) */
.emergency-btn{border:none;border-radius:12px;background:#C0392B;color:#fff;font:700 13px var(--sans);
  height:38px;width:136px;padding:0 10px;justify-content:center;cursor:pointer;box-shadow:0 4px 14px rgba(192,57,43,.35);display:flex;align-items:center;gap:7px;}
.emergency-btn:active{transform:scale(.97);}
/* Local guidance mode pill — a low-key mode toggle in the top bar (not an error, not red, no alarm icon). Light-purple fill when ON. */
/* Fixed width = all four states EN(Offline mode/mode ON)/JA(オフラインモード/モード ON) share one button -> right-side controls stay put. The モード wording is zero-ruby; the pitch explains its simulated nature. */
.lg-pill{border:1px solid var(--line);border-radius:20px;background:transparent;color:var(--ink-soft);font:600 11px var(--sans);height:38px;width:132px;padding:0;justify-content:center;display:inline-flex;align-items:center;cursor:pointer;white-space:nowrap;}/* De-emphasized = utility gray (a demo utility, not a primary feature); ON state stays light-purple so it is visible while in use */
.lg-pill:hover{filter:brightness(0.97);}
.lg-pill.on{background:#EDEBF7;border-color:#C7C2E6;color:#4A4470;}
/* Connection status pill — real navigator.onLine (reports browser connectivity only, not whether AI/portal is available) */
.demo-status-pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,0.6);color:var(--ink-soft);font:600 11px var(--sans);height:34px;padding:0 10px;white-space:nowrap;}
.demo-status-dot{width:7px;height:7px;border-radius:50%;background:#7BB98C;}
.demo-status-pill.off{color:#9A6A3A;}
.demo-status-pill.off .demo-status-dot{background:#D9A441;}
.offline-banner{background:#FBF3E7;border:1px solid #E8D3A8;color:#8A6A2E;font-size:12px;line-height:1.55;border-radius:10px;padding:9px 12px;margin-bottom:12px;}
/* tabs */
.tabs{max-width:1200px;margin:0 auto;padding:0 22px;display:flex;gap:6px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
/* Fixed height (52px) + text bottom-aligned: JA ruby sits in the reserved space above, EN just gets extra whitespace -> divider position is constant across both languages (QA) */
.tabs button{border:none;background:transparent;color:var(--ink-soft);font:600 13px var(--sans);
  height:52px;padding:0 16px 12px;display:inline-flex;align-items:flex-end;justify-content:center;
  cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
/* Per-slot min-width = the wider of the two languages (fixed tab order: lens/check(きょう)/recommend/kit/pack/profile/guide, after the IA front-door redesign) -> tab positions stay constant when switching language */
.tabs button:nth-child(1){min-width:96px;}
.tabs button:nth-child(2){min-width:96px;}
.tabs button:nth-child(3){min-width:120px;}
.tabs button:nth-child(4){min-width:156px;}
.tabs button:nth-child(5){min-width:120px;}
.tabs button:nth-child(6){min-width:100px;}
.tabs button:nth-child(7){min-width:76px;}
.tabs button.on{color:var(--lav-deep);border-bottom-color:var(--lav-deep);}
/* Lens = signature AI feature, always on a washi (Japanese-paper) background (so it reads as a key feature at a glance); washi not lavender aligns with the Guide's "color carries meaning" language (washi color = AI layer) */
.tabs button.t-lens{background:#F5EEDC;background-clip:padding-box;border-radius:10px;color:#8A7140;}/* Opaque light gold (a translucent overlay would muddy it); clip = the gold does not bleed into the bottom 2px border slot */
.tabs button.t-lens.on{background:var(--gold);color:#6B5730;border-bottom-color:transparent;}/* Lens active = deeper gold, no underline (an underline over the gold reads as a shadow; the pill itself indicates position) */
/* Bottom nav (mobile navigation moves to the bottom bar = thumb zone; 4 direct + その他 More panel; not used on desktop) */
.bnav,.bnav-more,.bnav-scrim{display:none;}

.wrap{max-width:1200px;margin:0 auto;padding:18px 22px 60px;}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.search{flex:1;min-width:180px;border:1px solid var(--line);border-radius:12px;background:var(--cloud);
  height:38px;padding:0 13px;font:400 13px var(--sans);color:var(--ink);}
.btn{border:none;border-radius:12px;font:600 13px var(--sans);cursor:pointer;height:38px;display:inline-flex;align-items:center;padding:0 15px;transition:.15s;}
.btn-primary{background:var(--lav-deep);color:#fff;box-shadow:0 4px 14px rgba(145,137,192,.3);}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.7);border:1px solid var(--line);color:var(--ink-soft);}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
/* Single-row element height is fixed so the layout anchor does not move when switching EN/JA(ruby) (acceptance criterion).
   Bottom-aligned: pills with ruby and those without (AED, etc.) share one text baseline, with ruby floating in the reserved space. */
.pill-btn{border:1px solid var(--line);background:var(--cloud);color:var(--ink-soft);border-radius:20px;
  height:38px;padding:0 12px 8px;display:inline-flex;align-items:flex-end;font:500 12px var(--sans);cursor:pointer;}
.pill-cnt{font-family:var(--num);font-size:10px;font-weight:600;opacity:.65;margin-left:3px;}
.np-gloss{font-size:12px;color:var(--ink-soft);margin:-6px 2px 12px;line-height:22px;}
.gen-note{font-size:10.5px;color:var(--ink-faint);margin:8px 2px 6px;line-height:18px;}/* ＊inline explanation (rendered only when a generated name exists; placed at the top of the 周辺ビュー list) */
.pill-btn.on{background:var(--lav);border-color:var(--lav);color:#4A4470;font-weight:600;}

/* stats — equal-width grid: cells share the same width and auto-equalize row height (they do not stretch with text); minmax gives flexible column widths that wrap on narrow screens without breaking mobile (QA) */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,170px));gap:12px;margin-bottom:16px;}
.stat{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:14px;padding:12px 18px;}
.stat .v{font-family:var(--num);font-size:26px;font-weight:700;color:var(--ink);}
.stat .l{font-size:11px;letter-spacing:.5px;color:var(--ink-soft);text-transform:uppercase;margin-top:2px;line-height:1.25;min-height:20px;display:flex;align-items:flex-end;}/* Bottom-aligned: labels with and without ruby share one baseline; min-height reserves ruby space so EN/JA are the same height */
.stat.warn .v{color:var(--rose-deep);}

/* grid + cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.card{position:relative;background:rgba(255,255,255,.66);border:1px solid var(--line);border-radius:16px;
  padding:15px 16px 14px 19px;box-shadow:var(--shadow-card);overflow:hidden;}
.card .strip{position:absolute;left:0;top:0;bottom:0;width:4px;}
.s-calm{background:linear-gradient(180deg,#fff,var(--lav));}
.s-alert{background:linear-gradient(180deg,var(--rose),var(--rose-deep));}
.s-info{background:linear-gradient(180deg,#DCE6F2,var(--sky-deep));}
.s-gold{background:linear-gradient(180deg,#fff,var(--gold));}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
/* Card text line-heights include ruby (name 31px / meta 24px): JA no longer makes the card taller than EN, so row boundaries land at nearly the same position in both languages */
.c-name{font-family:var(--serif);font-size:16px;font-weight:600;line-height:31px;}
.c-line{font-size:12px;color:var(--ink-soft);margin-top:5px;line-height:24px;}
.dg-sub{font-size:11.5px;font-weight:700;color:var(--ink);margin-top:10px;line-height:22px;}
.dg-sub:first-of-type{margin-top:4px;}
.dg-none{color:var(--ink-faint);}
.dg-hint{font-size:11px;color:#9B6470;margin-top:3px;line-height:20px;}/* 切れた action hint (賞味期限 != safety expiry -> say 替えて, not 捨てて) */
.dg-lucky{grid-column:1/-1;}/* Lucky-action card spans full width */
.dg-lucky .c-line{text-align:center;font-size:13px;}
.c-exp{font-size:12px;font-weight:700;margin-top:5px;}
.exp-soon{color:var(--gold-deep);}.exp-bad{color:var(--rose-deep);}.exp-ok{color:var(--ink-soft);font-weight:400;}
.c-gap{font-size:12px;color:#9B6470;margin-top:6px;line-height:1.5;}
.c-actions{margin-top:10px;display:flex;gap:8px;}
.icon-btn{border:none;background:rgba(0,0,0,.05);color:var(--ink-soft);border-radius:8px;height:30px;display:inline-flex;align-items:center;padding:0 10px;font-size:12px;cursor:pointer;}
/* pill ruby overflow fix v3: squeezing headroom did not work on Safari (ruby annotations add extra gap; a bordered pill always shows overflow) -> give real head space instead: pill-btn 32->38, pill 30->34 (added equally to both languages so the EN⇄JA anchor does not move); rt anchored at 8px */
.pill ruby rt,.pill-btn ruby rt{font-size:8px;line-height:1;}
.pill{font-size:10px;letter-spacing:.8px;height:34px;display:inline-flex;align-items:flex-end;padding:0 10px 6px;border-radius:20px;white-space:nowrap;}
.p-calm{color:#6E66A0;background:rgba(208,202,233,.3);}
.p-alert{color:#9B6470;background:rgba(234,214,219,.5);}
.p-info{color:#5C7AA0;background:rgba(203,218,238,.5);}
.p-gold{color:#8A7140;background:rgba(233,222,194,.55);}
.p-mute{color:var(--ink-soft);background:var(--pearl);}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.note-pending{font-size:11px;color:var(--ink-faint);font-style:italic;margin-top:6px;}
.empty{color:var(--ink-faint);font-size:13px;padding:30px;text-align:center;}
.empty-ic{font-size:20px;color:var(--lav-deep);opacity:.55;margin-bottom:6px;}
/* Status explanation (definition table) */
.legend{margin:4px 0 14px;border:1px solid var(--line-soft);border-radius:12px;background:rgba(255,255,255,.45);padding:6px 12px;}
.legend summary{cursor:pointer;font-size:12.5px;color:var(--ink-soft);font-weight:600;list-style:none;}
.legend summary::-webkit-details-marker{display:none;}
.legend summary::before{content:'ℹ️ ';}
.legend-body{margin-top:10px;display:flex;flex-direction:column;gap:7px;padding-bottom:4px;}
.legend-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink);line-height:1.5;}
.legend-row .pill{flex-shrink:0;}
/* きょう page title: min-height reserves ruby space so the EN/JA anchor stays constant; the date is bottom-aligned to share the title baseline */
.check-title{display:flex;align-items:flex-end;gap:10px;margin:2px 2px 14px;min-height:34px;}
.ct-t{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.3px;}
.ct-date{font-size:12.5px;color:var(--ink-soft);padding-bottom:2px;}
/* 周辺ビュー（Nearby View / Local Pack A）*/
.np-head{margin-bottom:14px;}
.np-title{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.3px;min-height:34px;display:flex;align-items:flex-end;}/* Reserves ruby space; font unified to display (inner-page titles standardized) */
.np-sub{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.6;}
.np-sub2{display:inline;}/* desktop one line; mobile wraps (a "Works offline" trailing wrap looked awkward -> parentheses folded into the label, location on its own line) */
.np-off{color:var(--ink-soft);font-weight:600;}/* Green + ● looked like an online status (clashing with the connection pill) -> neutral color, dot removed */
.np-prio{display:flex;gap:10px;margin-bottom:16px;}
.np-pcard{flex:1;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:16px;padding:13px 15px 14px;position:relative;overflow:hidden;}
.np-pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.np-pcard.shelter::before{background:var(--sky-deep);}.np-pcard.aed::before{background:var(--rose-deep);}
.np-pl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);}
.np-pnm{font-size:14.5px;font-weight:600;margin:5px 0 4px;line-height:1.3;}
/* Official Japanese name + English fallback (facility-name ruby is never fabricated -> the EN name serves as a readability fallback, always shown in both languages) */
.np-pen{font-size:11.5px;color:var(--ink-soft);margin:-2px 0 4px;}
.lens-loc-en{color:#9A8468;font-size:11px;}
.np-pd{font-family:var(--num);font-size:13px;font-weight:700;color:var(--ink);}
.np-list{display:flex;flex-direction:column;gap:8px;}
.np-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:13px;padding:11px 14px;}
.np-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.np-ico.sh{background:rgba(203,218,238,.5);}.np-ico.aed{background:rgba(234,214,219,.55);}
.aed-badge{font:700 11px var(--num);color:#9B6470;letter-spacing:.5px;}
.np-mid{flex:1;min-width:0;overflow:hidden;}/* A long facility name wrapped in ruby is an unbreakable atom (JA-only overflow blew up the mobile layout into a zoom) -> contain it within the row */
.np-nm{font-size:14.5px;font-weight:600;line-height:1.3;}
.np-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.np-ico.wp{background:rgba(193,224,224,.55);}
.np-typ{font-size:10px;letter-spacing:.5px;padding:2px 8px;border-radius:20px;}
.np-typ.sh{color:#5C7AA0;background:rgba(203,218,238,.5);}.np-typ.aed{color:#9B6470;background:rgba(234,214,219,.5);}.np-typ.wp{color:#3F8585;background:rgba(193,224,224,.5);}
/* guidance card (types with no offline points: online -> ポータル / offline -> guidance) */
.np-guide{background:rgba(255,255,255,.65);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:4px;}
.npg-what{font-size:14px;line-height:1.5;}
.npg-mark{font-size:13px;line-height:1.5;margin-top:9px;padding:9px 11px;background:rgba(247,233,199,.45);border-radius:10px;}
.npg-note{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin-top:9px;}
/* 海抜 (elevation) comparison card (presents hard data, does not judge Safe/Danger) */
.elev-card{background:rgba(255,255,255,.66);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin:2px 0 13px;}
.elev-h{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.3px;margin-bottom:10px;}
.elev-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.elev-ic{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.elev-nm{color:var(--ink);width:38%;flex-shrink:0;min-width:0;}
.elev-role{display:block;font-size:10.5px;color:var(--ink-soft);line-height:20px;min-height:20px;}/* Add role labels to the three rows (highest point = the reference); reserve ruby line-height */
.elev-fnm{display:block;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.elev-bar{flex:1;height:9px;background:var(--pearl);border-radius:5px;overflow:hidden;}
.elev-bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#9FC6E0,#7DA86F);}
.elev-v{font:700 14px Arial,"Helvetica Neue",sans-serif;color:var(--ink);flex-shrink:0;width:50px;text-align:right;}
.elev-note{font-size:11px;color:var(--ink-soft);line-height:1.45;margin-top:7px;}
/* ガイド / Guide page */
.g-intro{font-size:13px;color:var(--ink-soft);margin:2px 2px 14px;line-height:1.5;}
.g-item{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:9px;}
.g-term{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.g-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
.g-promise{background:rgba(247,233,199,.32);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.g-pr{font-size:12.5px;color:var(--ink);line-height:1.6;margin-bottom:7px;}
.g-pr:last-child{margin-bottom:0;}
.np-right{text-align:right;flex-shrink:0;}
.np-dist{font-family:var(--num);font-size:15px;font-weight:600;color:var(--ink-soft);line-height:1;}/* Pure black 700 was too heavy and clashed with the place name */
.np-dir{font-size:11px;color:var(--ink-soft);margin-top:3px;}
/* min-height 42 = fits one line of JA ruby (17px + rt) -> EN/JA title bottoms align, and the page does not shift down when switching language */
.sec-h{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:1px;color:var(--ink);margin:18px 2px 10px;min-height:42px;display:flex;align-items:flex-end;}
/* Profile collapsible sections (mobile is the primary view; keep the page from being one long scroll). Summary reuses .sec-h typography + a rotating chevron. */
.prof-sec{border-top:1px solid var(--line-soft);}
.prof-sec>summary.prof-sum{cursor:pointer;list-style:none;align-items:center;justify-content:space-between;}
.prof-sec>summary.prof-sum::-webkit-details-marker{display:none;}
.prof-sec>summary.prof-sum::after{content:'▾';font-size:12px;font-weight:400;color:var(--ink-soft);transition:transform .2s;}
.prof-sec[open]>summary.prof-sum::after{transform:rotate(180deg);}
.prof-sec-body{padding-bottom:8px;}
.page-h{font-size:18px;font-weight:700;letter-spacing:.3px;margin:2px 2px 14px;min-height:34px;}/* Standard spec for inner-page titles: used stacked over sec-h so the first title on a page does not eat 42+18top (the root cause of the "extra blank line") */

/* Back-to-top button */
#to-top{position:fixed;right:18px;bottom:18px;z-index:30;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  background:rgba(255,255,255,.92);color:var(--lav-deep);font:700 18px var(--sans);cursor:pointer;box-shadow:0 4px 14px rgba(60,64,80,.18);
  display:none;align-items:center;justify-content:center;}
#to-top.show{display:flex;}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(60,64,80,.4);backdrop-filter:blur(2px);display:none;
  align-items:center;justify-content:center;z-index:40;padding:20px;}
.modal-ov.show{display:flex;}
.modal{background:var(--cloud);border-radius:18px;box-shadow:var(--shadow-soft);width:100%;max-width:460px;
  max-height:90vh;overflow-y:auto;padding:22px;}
.modal h3{font-family:var(--display);font-size:20px;font-weight:600;letter-spacing:1px;margin-bottom:4px;}
.modal .field{margin-top:12px;}
.modal label{display:block;font-size:11px;letter-spacing:.5px;color:var(--ink-soft);text-transform:uppercase;margin-bottom:4px;}
.modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font:400 14px var(--sans);color:var(--ink);background:#fff;}
.modal .row{display:flex;gap:10px;}.modal .row>*{flex:1;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.scan-row{display:flex;align-items:center;gap:8px;background:rgba(233,222,194,.18);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:6px;}
.scan-row .lbl{font-size:11px;color:var(--gold-deep);font-weight:700;letter-spacing:.5px;flex:1;}
/* match box (scan -> match) */
.match-box{margin-top:10px;}
.match-ok{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#5E7A55;background:rgba(206,230,202,.35);border:1px solid rgba(120,160,110,.3);border-radius:10px;padding:9px 12px;}
.match-confirm{font-size:12px;color:#5C7AA0;background:rgba(203,218,238,.28);border:1px solid rgba(123,153,192,.3);border-radius:10px;padding:10px 12px;}
.match-confirm .mc-h{font-weight:700;color:#3D4050;display:block;margin-bottom:7px;}
.chip-rule{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:18px;height:30px;display:inline-flex;align-items:center;padding:0 11px;font:500 12px var(--sans);cursor:pointer;margin:0 5px 5px 0;}
.chip-rule:hover{border-color:var(--sky-deep);}
.chip-rule.on{background:var(--sky);border-color:var(--sky-deep);color:#3A4A5E;font-weight:600;}
.chip-rule .sc{color:var(--ink-faint);font-size:10px;}
.match-conf{font-size:10px;letter-spacing:.5px;color:var(--ink-faint);margin-left:auto;}
/* recommend / coverage (v0.4) */
.cov-bar{height:9px;border-radius:6px;background:var(--pearl);overflow:hidden;margin:4px 0 2px;}
.cov-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--lav-deep),var(--sky-deep));}
.c-target{font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:24px;}
.c-target b{color:var(--ink);font-weight:700;}
.c-need{font-size:12px;font-weight:700;color:#9B6470;margin-top:4px;line-height:24px;}
.s-cover{background:linear-gradient(180deg,#fff,#BFD8B6);}
.p-cover{color:#5E7A55;background:rgba(206,230,202,.5);}
/* ready check: image (fallback text) + circular % progress (replaces the line bar) */
.rc-row{display:flex;align-items:center;gap:11px;}
.cat-ico{display:flex;justify-content:center;margin-bottom:7px;}
.cat-ico svg{width:60px;height:72px;}/* Same size as the hero; the old 30px override rule was removed (it was why the icon stayed small) */
.rc-mid{flex:1;min-width:0;}
.cov-ring{position:relative;width:54px;height:54px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--rc) calc(var(--p)*1%),var(--pearl) 0);}
.cov-ring::before{content:'';position:absolute;width:40px;height:40px;border-radius:50%;background:#fff;}
.cov-ring span{position:relative;font:700 12.5px Arial,"Helvetica Neue",sans-serif;color:var(--ink);}
.cov-ring.missing{--rc:#C58A96;}.cov-ring.partial{--rc:#6E97C0;}.cov-ring.unknown{--rc:#C9A86A;}.cov-ring.cover{--rc:#7DA86F;}
/* Check page: overall-readiness big ring */
.check-hero{display:flex;flex-direction:column;align-items:center;gap:7px;margin:52px 0 60px;}/* Double the breathing room around the % ring */
.big-ring{position:relative;width:134px;height:134px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:conic-gradient(var(--rc) calc(var(--p)*1%),var(--pearl) 0);}
.big-ring::before{content:'';position:absolute;width:102px;height:102px;border-radius:50%;background:#fff;}
.big-ring .bp{position:relative;font:700 33px Arial,"Helvetica Neue",sans-serif;color:var(--ink);line-height:1;}
.big-ring .bl{position:relative;font-size:11px;color:var(--ink-soft);margin-top:4px;letter-spacing:.5px;}
.big-ring.low{--rc:#C58A96;}.big-ring.mid{--rc:#C9A86A;}.big-ring.high{--rc:#7DA86F;}
.check-sub{font-size:13px;color:var(--ink-soft);font-family:Arial,sans-serif;}
/* card photo thumb — square container, whole image fit-in proportionally, no cropping or distortion */
.c-thumb{display:block;width:100%;aspect-ratio:1/1;height:auto;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;}
/* やさしい日本語 ふりがな（漢字上に ruby）*/
ruby rt{font-size:.58em;color:var(--ink-soft);font-weight:400;letter-spacing:0;}
/* profile steppers + storage chips */
.stepper{display:flex;align-items:center;gap:10px;margin-top:6px;}
.stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:18px;cursor:pointer;color:var(--ink);}
.stepper .val{font-family:var(--num);font-size:22px;font-weight:700;min-width:32px;text-align:center;}
.loc-chips{display:flex;gap:6px;flex-wrap:wrap;}
.loc-chip{border:1px solid var(--line);background:#fff;border-radius:18px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--ink);}
.loc-chip.on{background:var(--lav);border-color:var(--lav);color:#4A4470;font-weight:600;}
.loc-chip .x{margin-left:6px;color:var(--ink-faint);}
/* photo boxes (modal) */
.photo-row{display:flex;gap:10px;margin-top:6px;}
.photo-box{flex:1;aspect-ratio:1;border:2px dashed var(--line);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:rgba(255,255,255,.5);}
.photo-box.has{border-style:solid;border-color:var(--lav-deep);}
.photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-box .ph{font-size:24px;opacity:.45;}.photo-box .pl{font-size:11px;color:var(--ink-soft);margin-top:3px;}
.photo-box input{display:none;}

/* emergency screen */
.emergency{position:fixed;inset:0;z-index:60;background:#F4EEF0;display:none;flex-direction:column;}
.emergency.show{display:flex;}
/* 防災御神籤 / Ready-Kuji overlay (Atelier white + shrine style) */
.kuji-ov{position:fixed;inset:0;z-index:62;background:rgba(60,52,58,.55);display:none;align-items:center;justify-content:center;padding:20px;}
.kuji-ov.show{display:flex;}
.kuji-slip{background:linear-gradient(180deg,#FCFAF7,#F4EFE9);border:1px solid #E4DACF;border-radius:18px;max-width:380px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 22px 18px;box-shadow:0 18px 50px rgba(0,0,0,.28);text-align:center;}
.kuji-top{font-size:11px;letter-spacing:3px;color:#A9967F;margin-bottom:8px;text-transform:uppercase;}/* Uppercase is CSS styling only; the string stays sentence case (EN rule) */
.kuji-tier{font-size:46px;font-weight:700;color:#7A5C3E;line-height:1.1;margin:2px 0;}
.kuji-tier ruby rt{font-size:12px;}/* The default rt .58em would scale with 46px into a giant ruby -> anchor it at 12px */
.kuji-tier .em{font-size:30px;}
.kuji-tier-en{font-size:11px;letter-spacing:2px;color:#A9967F;margin-bottom:6px;}
.kuji-pct{font:700 13px Arial,sans-serif;color:#7DA86F;margin-bottom:14px;}
.kuji-poem{font-size:16px;line-height:1.85;color:#5A4632;padding:6px 4px 2px;letter-spacing:.5px;}
.kuji-ai{font-size:10px;font-weight:700;color:#7DA86F;letter-spacing:.5px;}
/* まとめ dual hero: みくじ筒 | CSS camera side by side. Still by default; a gentle shake only on hover/press. */
.hero-row{display:flex;gap:12px;margin-bottom:12px;}
.kuji-hero{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:12px;padding:20px 12px 15px;
  background:linear-gradient(180deg,#FCFAF7,#F2EBE2);border:1px solid #E4DACF;border-radius:16px;cursor:pointer;}
/* CSS camera (same craft as the みくじ筒, no emoji to avoid baseline issues): blue-gray body + lens ring + washi highlight */
.lens-cam-art{width:60px;height:72px;display:flex;align-items:center;justify-content:center;}
.cam-body{position:relative;width:58px;height:44px;background:linear-gradient(160deg,#8A93B8,#5C7AA0);border-radius:10px;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.22),0 2px 6px rgba(60,74,102,.28);display:flex;align-items:center;justify-content:center;}
.cam-body::before{content:'';position:absolute;top:-6px;left:10px;width:16px;height:8px;background:#5C7AA0;border-radius:4px 4px 0 0;}
.cam-lens{width:24px;height:24px;border-radius:50%;background:#FCFAF7;border:5px solid #3E4A66;box-shadow:inset -2px -2px 0 rgba(0,0,0,.12);}
.kuji-hero .kuji-omi,.kuji-hero .stick{animation:none;}
.kuji-hero:hover .kuji-omi,.kuji-hero:active .kuji-omi{animation:komi-shake .9s ease-in-out infinite;}
.kuji-hero:hover .stick,.kuji-hero:active .stick{animation:komi-stick .9s ease-in-out infinite;}
.kuji-hero:hover .cam-body,.kuji-hero:active .cam-body{animation:cam-tilt .9s ease-in-out infinite;}
.kuji-hero:hover .cam-lens,.kuji-hero:active .cam-lens{animation:cam-focus .9s ease-in-out infinite;}
@keyframes cam-tilt{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
@keyframes cam-focus{0%,100%{transform:scale(1);}50%{transform:scale(.8);}}
.kuji-hero-t{font:700 15px var(--sans);color:#7A5C3E;letter-spacing:.5px;line-height:1.6;}
/* まとめ 絵馬 board: the digest card = an 絵馬 hanging under a wooden beam */
.ema-board{background:linear-gradient(180deg,#F7F0E4,#EFE4D2);border:1px solid #E0D2BC;border-radius:16px;padding:13px 13px 15px;}
.ema-rail{height:6px;border-radius:3px;background:linear-gradient(90deg,#C9B08A,#B49A63,#C9B08A);margin:2px 4px 14px;box-shadow:0 1px 2px rgba(120,90,40,.25);}
.ema-board .card::after{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--pearl);border:1px solid #D8C8AC;}
.ema-board .c-name{text-align:center;}/* Center the digest card title = 絵馬 style */
.kuji-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0 20px;color:#A9967F;font-size:13px;}
/* Sparkling draw: the 御神籤 tube shakes, the stick pokes up and down, three ✨ flash in alternation */
.kuji-omi{position:relative;width:60px;height:72px;transform-origin:50% 88%;animation:komi-shake .9s ease-in-out infinite;}
@keyframes komi-shake{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.kuji-omi .box{position:absolute;bottom:0;left:12px;width:36px;height:48px;background:linear-gradient(160deg,#C8504E,#A23A38);border-radius:7px 7px 6px 6px;box-shadow:inset 0 3px 0 rgba(255,255,255,.18),0 2px 6px rgba(120,40,40,.3);}
.kuji-omi .lid{position:absolute;top:20px;left:8px;width:44px;height:12px;background:#7A5C3E;border-radius:7px;box-shadow:0 2px 0 rgba(0,0,0,.12);}
.kuji-omi .band{position:absolute;bottom:13px;left:12px;width:36px;height:15px;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;font:700 11px/1 serif;color:#A23A38;}
.kuji-omi .stick{position:absolute;top:-2px;left:28px;width:5px;height:28px;background:linear-gradient(#F0E2BE,#CDB888);border-radius:3px;transform-origin:bottom;animation:komi-stick .9s ease-in-out infinite;}
@keyframes komi-stick{0%,100%{transform:translateY(2px) rotate(-5deg);}50%{transform:translateY(-3px) rotate(5deg);}}
.kuji-spark{position:absolute;font-size:13px;line-height:1;animation:komi-spark 1.1s ease-in-out infinite;}
.kuji-spark.s1{top:-4px;left:-8px;animation-delay:0s;}
.kuji-spark.s2{top:14px;right:-10px;animation-delay:.35s;}
.kuji-spark.s3{bottom:0;left:-6px;animation-delay:.7s;}
@keyframes komi-spark{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1.1);}}
.kuji-load-txt{letter-spacing:.5px;}
/* ---- Lens (防災カメラ) ---- */
.lens-wrap{max-width:520px;margin:0 auto;}
.lens-intro{font-size:13px;color:#8A7E70;line-height:1.6;margin-bottom:12px;}
/* Native zoom slider: shown only when the track reports zoom capability; hidden entirely if unsupported */
.lens-zoom{display:none;position:absolute;left:14%;width:72%;bottom:12px;z-index:5;accent-color:#F2EBE2;}
.lens-stage{position:relative;background:#14120E;border-radius:16px;aspect-ratio:3/4;max-height:440px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}/* Center the camera view (when the aspect-ratio-derived width 330 < wrap 520 it was previously left-aligned) */
#lens-video{display:none;width:100%;height:100%;object-fit:cover;}
#lens-preview{display:none;width:100%;height:100%;object-fit:contain;background:#14120E;}
.lens-ph{font-size:46px;opacity:.45;}
.lens-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72%;height:54%;pointer-events:none;}
.lens-frame .lc{position:absolute;width:26px;height:26px;border:3px solid rgba(255,255,255,.82);}
.lc.tl{top:0;left:0;border-right:0;border-bottom:0;border-radius:7px 0 0 0;}
.lc.tr{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 7px 0 0;}
.lc.bl{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 7px;}
.lc.br{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 7px 0;}
/* Overlaid shutter (mobile only; desktop keeps the acts-row Scan button = unchanged). Hidden by default, shown via .lens-stage.cam-on in the mobile media query. */
.lens-shutter{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:14px;z-index:6;font:700 15px Arial,sans-serif;background:#F2EBE2;color:#3C342E;border:none;border-radius:26px;height:48px;padding:6px 30px 10px;align-items:flex-end;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.4);}
.lens-shutter ruby rt{font-size:8px;line-height:1;}
.lens-acts{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;}
.lens-btn{flex:1;min-width:120px;display:inline-flex;align-items:center;justify-content:center;font:600 14px Arial,sans-serif;height:48px;padding:0 14px;border-radius:11px;cursor:pointer;border:1px solid #E4DACF;background:#FCFAF7;color:#3C342E;}
.lens-btn.cam,.lens-btn.shoot{background:#7A5C3E;color:#fff;border-color:#7A5C3E;}
.lens-btn.up{display:inline-flex;align-items:center;justify-content:center;}
.lens-loading{display:flex;align-items:center;gap:10px;color:#8A7E70;font-size:13px;padding:18px 0;}
.lens-spin{width:22px;height:22px;border:3px solid rgba(122,92,62,.2);border-top-color:#7A5C3E;border-radius:50%;animation:kspin .8s linear infinite;}
.lens-fail{background:rgba(0,0,0,.04);border-radius:11px;padding:16px;color:#8A7E70;font-size:13.5px;line-height:1.6;text-align:center;}
.lens-raw{background:#14120E;color:#EDE6DD;border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.lens-rl{font-size:10px;letter-spacing:1.2px;color:#B3A99C;margin-bottom:5px;}
.lens-rt{font-size:14px;line-height:1.7;}

const esc=(s)=>String(s==null?'':s).replace(/[&<>"'`]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'}[c]));
/* jsq: for inline JS string arguments like onclick="Fn('${esc(jsq(v))}')". esc only guards the HTML layer;
 * a &#39; inside an HTML attribute is decoded back to ' before JS parses it -> esc alone cannot prevent JS-string escape (e.g. John's closet would break the button).
 * jsq first (escapes \ and ') then esc (HTML entities) = both layers safe. Fixed 2026-07-02 (review P1#2). */
const jsq=(s)=>String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

const genNote=(any)=>any?`<div class="gen-note">${state.lang==='ja'?'＊＝この アプリの 翻訳（ほんやく）です。正式（せいしき）な 英語名（えいごめい）では ありません。':'＊ = translated by this app, not an official name.'}</div>`:'';

/* やさしい日本語: after render, convert 漢字（かな） -> <ruby>漢字<rt>かな</rt></ruby> (kana above the kanji).
 * Touches text nodes only, never input value/attributes; processes node by node to avoid regex lastIndex issues. */
function applyRuby(root){
  // Ruby is applied in both EN and やさしい modes: the Japanese on screen is for the user themselves plus any helping Japanese bystander, and both need furigana.
  if(!root)return;
  const pat=/([一-鿿々〆ヶ][一-鿿々〆ヶぁ-ゖ]*)（([぀-ヿー]+)）/;
  const w=document.createTreeWalker(root,4,null);  // 4 = NodeFilter.SHOW_TEXT (avoids relying on a global NodeFilter, so jsdom/vm also work)
  const targets=[];let n;
  while((n=w.nextNode())){ if(n.nodeValue&&n.parentNode&&n.parentNode.nodeName!=='RUBY'&&pat.test(n.nodeValue)) targets.push(n); }
  targets.forEach(t=>{ const s=document.createElement('span');
    s.innerHTML=t.nodeValue.replace(/([一-鿿々〆ヶ][一-鿿々〆ヶぁ-ゖ]*)（([぀-ヿー]+)）/g,'<ruby>$1<rt>$2</rt></ruby>');
    t.parentNode.replaceChild(s,t); });
}

  const COORD_TYPES=['shelter','aed','water_point'];

  const typLabel=(ty)=>(FAC_TYPE[ty]||{en:ty,ja:ty})[state.lang];
  // Official facility type -> EN (sentence case, acronyms uppercase; deterministic mapping of 6 fixed values, not AI translation)
  // Format: Category chip · Facility type · English name (always last); in JA mode the type uses the official original wording
  const OFFICIAL_TYPE_EN={
    'AED設置場所':'AED location',
    '区民避難所（地域防災拠点）':'Residents’ shelter (community disaster hub)',
    '福祉避難所':'Welfare shelter',
    '小規模応急給水槽（100立方メートル槽）':'Small emergency water tank (100 m³)',
    '浄水場・給水所':'Water supply station',

  // ② priority cards（最寄り 避難所 / AED）
  const ps=nearestOf('shelter'),pa=nearestOf('aed');

    <div class="np-pcard ${ty}"><div class="np-pl">${esc(state.lang==='ja'?jaL:enL)}</div>
      <div class="np-pnm">${facNm(p.facility)}</div>

      <div class="np-pd">${esc(C.formatDistance(p.distance_m,state.lang))} · ${esc(C.compass8(C.bearingDeg(me,p.facility),state.lang))}</div></div>`:'').join('')+`</div>`;
  // ②' 海抜 (elevation) comparison card (presents hard data; does not judge Safe/Danger, does not navigate) — GSI elevation, T.P.

    return `<div class="np-row">

      <div class="np-mid"><div class="np-nm">${facNm(f)}</div>
        <div class="np-meta"><span class="np-typ ${cls}">${esc(typLabel(f.type))}</span>${typJpEn(f)?' · '+esc(typJpEn(f)):''}${facEn(f)?' · '+esc(facEn(f)):''}</div></div>
      <div class="np-right"><div class="np-dist">${esc(C.formatDistance(distance_m,state.lang))}</div><div class="np-dir">${esc(dir)}${state.lang==='ja'?'むき':''}</div></div>
    </div>`;}).join('')+`</div>`;
  return h;
}

// ---- CHECK ----
function renderCheck(){
  const L=t();const summary=C.computeKitSummary(supplies(),NOW);
  const cov=C.computeCoverage(supplies(),catalog(),family(),NOW);
  const expSoon=summary.items.filter(i=>i.status==='expiring_soon'),expired=summary.items.filter(i=>i.status==='expired');
  const lowItems=summary.items.filter(i=>i.status==='low'),missItems=summary.items.filter(i=>i.status==='missing');
  const missCats=C.kitMissingCategories(supplies(),NOW);
  const pi=C.localPackInfo(packObj(),NOW);
  const grab=summary.grab[0];
  // Lucky-action line (a good-deed-a-day style): the verb is deterministic by status; the cause-effect is truthful ("備えが上がります", since the fortune is computed from 備え anyway)
  const luckyLine=(it)=>{
    const ja=state.lang==='ja';const n=nm(it);
    const V={expiring_soon:['買（か）い直（なお）して ください','Replace'],expired:['買（か）い直（なお）して ください','Replace'],missing:['買（か）って ください','Buy'],low:['買（か）い足（た）して ください','Top up on']};
    const v=V[it.status]||V.low;
    return ja?`${n}を ${v[0]}。そろい具合（ぐあい）が 上（あ）がります。`:`${v[1]} ${n}. Your covered % goes up.`;
  };
  const nm=(it)=>state.lang==='ja'?(it.name_ja||it.name_en||''):(it.name_en||it.name_ja||'');
  // One card, two subheadings (sectioned subtitles = everything visible at a glance); subheadings use the finalized status vocabulary, and an empty section showing — is also information
  const sec2=(pairs)=>{
    if(!pairs.some(([,a])=>a.length))return `<div class="c-line">${L.allReady}</div>`;
    return pairs.map(([lb,a,hint])=>`<div class="dg-sub">${esc(lb)}</div>`+(a.length?a.map(i=>`<div class="c-line">• ${esc(nm(i))}</div>`).join('')+(hint?`<div class="dg-hint">${esc(hint)}</div>`:''):`<div class="c-line dg-none">—</div>`)).join('');
  };
  const pc=cov.percent;const ringCls=pc>=80?'high':pc>=50?'mid':'low';
  // Page title: きょうの おまもり + date. The date avoids the X日 reading (ついたち/よっか are irregular; a wrong reading is worse than none) -> numeric 7/4 + weekday ruby = smartphone-UI convention
  const jaC=state.lang==='ja';
  const wd=NOW.getDay();
  const dateStr=jaC
    ?`${NOW.getMonth()+1}/${NOW.getDate()}（${['日（にち）','月（げつ）','火（か）','水（すい）','木（もく）','金（きん）','土（ど）'][wd]}）`
    :`${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][wd]}, ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][NOW.getMonth()]} ${NOW.getDate()}`;
  return `<div class="check-title"><span class="ct-t">${esc(L.checkTitle)}</span><span class="ct-date">${esc(dateStr)}</span></div>
  <div class="hero-row">
  <button class="kuji-hero" onclick="App.openKuji()">
    <div class="kuji-omi"><span class="box"></span><span class="stick"></span><span class="lid"></span><span class="band">御</span></div>
    <div class="kuji-hero-t">${esc(L.kuji.launch)}</div>
  </button>
  <button class="kuji-hero" onclick="App.go('lens')">
    <div class="lens-cam-art"><span class="cam-body"><span class="cam-lens"></span></span></div>
    <div class="kuji-hero-t">${esc(L.kuji.lensGo)}</div>
  </button>
  </div>
    <div class="check-hero">
      <div class="big-ring ${ringCls}" style="--p:${pc}"><span class="bp">${pc}%</span><span class="bl">${esc(L.rec.pct)}</span></div>
      <div class="check-sub">${cov.coveredCount} / ${cov.applicableCount} ${esc(L.total)}</div>
    </div>
    <div class="ema-board"><div class="ema-rail"></div><div class="grid">
    <div class="card"><div class="strip s-gold"></div><div class="c-name">${L.checkExpiring}</div>${sec2([[L.st.expiring_soon,expSoon],[L.st.expired,expired,L.expiredHint]])}</div>
    <div class="card"><div class="strip s-alert"></div><div class="c-name">${L.checkLow}</div>${sec2([[L.st.low,lowItems],[L.st.missing,missItems]])}</div>
    <div class="card"><div class="strip s-info"></div><div class="c-name">${L.checkCats}</div><div class="badges">${missCats.length?missCats.map(c=>`<span class="pill p-alert">${esc(L.cat[c]||c)}</span>`).join(''):`<span class="c-line">${L.allReady}</span>`}</div></div>
    <div class="card"><div class="strip s-info"></div><div class="c-name">${L.checkPack}</div><div class="c-line">${pi.oldestUpdate?L.packAge(fmtPackDate(pi.oldestUpdate)):'—'}</div></div>
    <div class="card dg-lucky"><div class="strip s-gold"></div><div class="c-name">${L.checkToday}</div><div class="c-line">${grab?esc(luckyLine(grab)):L.allReady}</div></div>
  </div></div>`;
}

function renderRecommend(){
  const L=t();const cat=catalog();
  if(!cat.length)return `<div class="empty">${state.lang==='ja'?'おすすめの リストを ひらけません。':'Recommended list unavailable'}</div>`;
  const cov=C.computeCoverage(supplies(),cat,family(),NOW);
  // Card ordering: "most-needed-during-a-disaster first" (water/staple food on top), not sorted by coverage status. Items not on the list (infant/pet) come after the 14 items, before the Extra card.
  const ORDER=['water','food_staple','portable_toilet','light','radio','cash','food_retort','food_canned','food_dry','food_nutrition','hygiene','medical','power_bank','cooking_stove'];
  const ordIdx=(id)=>{const i=ORDER.indexOf(id);return i<0?ORDER.length:i;};
  const rows=[...cov.rows].sort((a,b)=>ordIdx(a.rule_id)-ordIdx(b.rule_id));
  const missing=cov.rows.filter(r=>r.status==='missing').length;
  const partial=cov.rows.filter(r=>r.status==='partial').length;
  const stripOf=(s)=>s==='missing'?'s-alert':s==='partial'?'s-info':s==='unknown'?'s-gold':'s-cover';
  const pillOf=(s)=>s==='missing'?'p-alert':s==='partial'?'p-info':s==='unknown'?'p-mute':s==='covered_expiring'?'p-gold':'p-cover';
  const ringOf=(s)=>s==='missing'?'missing':s==='partial'?'partial':s==='unknown'?'unknown':'cover';
  // Image = a photo of an item already registered under this rule (used when available, otherwise fallback text)
  // RC = text only (photos belong to My Emergency Kit; pictograms are only for Profile)
  let h=`<div class="sec-h page-h">${esc(L.rec.title)}</div><div class="src-note">${esc(L.rec.desc)}</div>
  <div class="stats">
    <div class="stat"><div class="v">${cov.percent}%</div><div class="l">${esc(L.rec.sum.covered)}</div></div>
    <div class="stat"><div class="v">${cov.coveredCount}/${cov.applicableCount}</div><div class="l">${esc(L.rec.sum.items)}</div></div>
    <div class="stat"><div class="v">${missing}</div><div class="l">${esc(L.rec.sum.toAdd)}</div></div>
    <div class="stat"><div class="v">${partial}</div><div class="l">${esc(L.rec.sum.inProgress)}</div></div>
  </div>
  <div class="grid">`+rows.filter(r=>!r.needs).map(r=>cardOf(r)).join('')+`</div>`
  +[['has_infant',L.rec.groupInfant],['has_pet',L.rec.groupPet]].map(([g,label])=>{
    const grp=rows.filter(r=>r.needs===g);
    if(!grp.length)return '';
    return `<div class="rc-group"><div class="rc-group-h">${esc(label)}</div><div class="grid">${grp.map(r=>cardOf(r)).join('')}</div></div>`;
  }).join('');
  function cardOf(r){
    const nm=state.lang==='ja'?r.name_ja:r.name_en;const unit=state.lang==='ja'?(r.target.unit||''):(EN_UNIT[r.target.unit]||r.target.unit||'');const lvl=SRC_LEVEL(r.source);
    const pct=Math.min(100,r.targetValue?Math.round(r.have/r.targetValue*100):0);
    const need=Math.max(0,r.targetValue-r.have);
    const act=(r.status==='missing'||r.status==='partial');
    return `<div class="card"><div class="strip ${stripOf(r.status)}"></div>
      <div class="rc-row">
        <div class="rc-mid">
          <div class="c-name">${esc(nm)}</div>
          <div class="rc-pill-row"><span class="pill ${pillOf(r.status)}">${esc(L.rec.st[r.status]||r.status)}</span></div>
          ${r.target.type==='per_household'?`<div class="c-target">${L.rec.have} <b>${r.have}</b> · ${esc(L.asNeededT)}</div>`:`<div class="c-target">${L.rec.have} <b>${r.have}</b> / ${r.targetValue} ${esc(unit)}</div>
          ${act?`<div class="c-need">${L.rec.need} ${need} ${esc(unit)}</div>`:''}`}
          ${(state.lang==='ja'?r.note_ja:r.note_en)?`<div class="rc-note-box">${esc(state.lang==='ja'?r.note_ja:r.note_en)}</div>`:''}
          <div class="c-src"><span class="src-badge sb-${lvl}">${esc(L.rec.lvl[lvl])}</span></div>
        </div>
        <div class="cov-ring ${ringOf(r.status)}" style="--p:${pct}"><span>${pct}%</span></div>
      </div>
      <div class="c-actions"><button class="icon-btn" onclick="App.addFromRule('${r.rule_id}')">${L.rec.add}</button></div></div>`; // At 100% coverage the Add button does not disappear (you can keep adding; RC is the primary add entry and stays open)
  }
  // Trailing "Extra kit items" free-entry point (Ready Check is the primary add entry). openAdd -> name has no match -> matched_rule_id=null -> not counted in coverage, still stored, still offered by Lens "Bring from your kit".
  h+=`<div class="grid" style="margin-top:16px"><div class="card"><div class="strip s-info"></div>
    <div class="rc-row"><div class="rc-mid">
      <div class="c-name">${esc(L.rec.extraName)}</div>
      <div class="c-line" style="margin-top:4px;line-height:1.55">${esc(L.rec.extraDesc)}</div>
      <div class="c-src"><span class="src-badge sb-household">${esc(L.rec.lvl.household)}</span></div>
    </div></div>
    <div class="c-actions"><button class="icon-btn" onclick="App.openAdd()">${esc(L.rec.extraAdd)}</button></div>
  </div></div>`;
  return h;
}

function renderMatchBox(){

  // Do not show cert% / rule chips / ask the user to pick. Only use plain language to indicate whether this item counts toward Ready Check (read-only).
  const box=document.getElementById('m-match');if(!box)return;

  const rule=rid?catalog().find(r=>r.rule_id===rid):null;  // water_storage/no-match -> rule=null -> not counted (a container does not falsely report drinking water)
  if(rule){

  }else{

  }

}

// ---- 防災御神籤 / Ready-Kuji (deterministic fortune poem; Gemini humanization is a later layer) ----
const KUJI_TIER={
  daidaikichi:{ja:'大大吉',ruby:'大大吉（だいだいきち）',en:'Great Great Blessing'},
  daikichi:{ja:'大吉',ruby:'大吉（だいきち）',en:'Great Blessing'},
  chukichi:{ja:'中吉',ruby:'中吉（ちゅうきち）',en:'Middle Blessing'},
  shoukichi:{ja:'小吉',ruby:'小吉（しょうきち）',en:'Small Blessing'},
  kichi:{ja:'吉',ruby:'吉（きち）',en:'Blessing'},
};
// Draw = % readiness -> tier (deterministic) -> randomly pick 1 slip from that tier (poem + earthquake tip).
// Poem variation = rotating among multiple slips in the same tier. Gemini humanization later takes over the "poem layer" (see _GEMINI_HANDOFF_kuji.md); the earthquake tip is always grounded and never handed to Gemini.
// content = unified format (both static fallback and AI generation map to this): {poem_ja,poem_en,tip_ja,tip_en,no,source}
function renderKujiPoem(k,c){
  const L=t();const ja=state.lang==='ja';const TK=KUJI_TIER[k.tier.key]||KUJI_TIER.kichi;
  const poem=c?(ja?c.poem_ja:c.poem_en):'';
  const tip=c?(ja?c.tip_ja:c.tip_en):'';
  const titleStr=c?(ja?(c.title_ja||''):(c.title_en||'')):'';  // Short heading (<=5 chars) replaces the number display; the number stays in the data
  // Secret marks (a QA tell; users just see decoration and cannot decode the implementation detail): 🔮=AI, 📜=deterministic.
  // Note: ✨/🍀 were avoided because they are the 大吉/中吉 tier emoji and would be confusing -> use 🔮/📜, which do not collide with any tier. To change, edit these two characters below.
  const deco=(c&&c.source==='ai')?'🔮':'📜';
  const titleDeco=titleStr?` · ${deco}${esc(titleStr)}${deco}`:'';
  return `<div class="kuji-slip">
    <div class="kuji-top">${esc(L.kuji.title)}${titleDeco}</div>
    <div class="kuji-tier"><span class="em">${k.tier.emoji}</span> ${esc(ja?TK.ruby:TK.ja)}</div>
    <div class="kuji-tier-en">${esc(TK.en)}</div>
    <div class="kuji-pct">${esc(L.kuji.readiness)} ${k.percent}%</div>
    ${poem?`<div class="kuji-poem">${esc(poem)}</div>`:''}
    ${tip?`<div class="kuji-f"><div class="kuji-fl">🛟 ${esc(L.kuji.f_tip)}</div><div class="kuji-ft">${esc(tip)}</div></div>`:''}
    <div class="kuji-note">${esc(L.kuji.note)}</div>
    <div class="kuji-acts">
      <button class="kuji-close" onclick="App.closeKuji()">${esc(L.kuji.close)}</button>
      <button class="kuji-again" onclick="App.openKuji()">${esc(L.kuji.again)}</button>
    </div>
  </div>`;
}
function renderKujiLoading(k){
  const L=t();const ja=state.lang==='ja';const TK=KUJI_TIER[k.tier.key]||KUJI_TIER.kichi;
  return `<div class="kuji-slip">
    <div class="kuji-top">${esc(L.kuji.title)}</div>
    <div class="kuji-tier"><span class="em">${k.tier.emoji}</span> ${esc(ja?TK.ruby:TK.ja)}</div>
    <div class="kuji-tier-en">${esc(TK.en)}</div>

      <div class="kuji-omi"><span class="kuji-spark s1">✨</span><span class="kuji-spark s2">✨</span><span class="kuji-spark s3">✨</span><span class="box"></span><span class="stick"></span><span class="lid"></span><span class="band">御</span></div>
      <div class="kuji-load-txt">${esc(L.kuji.generating)}</div>
    </div>

const _kujiStatic=(fb)=>fb?{title_ja:(fb.title&&fb.title.ja)||'',title_en:(fb.title&&fb.title.en)||'',poem_ja:fb.poem.ja,poem_en:fb.poem.en,tip_ja:fb.quake_tip.ja,tip_en:fb.quake_tip.en,no:fb.no,source:'fallback'}:null;
let _qaTierIdx=0;
async function openKuji(){
  const k=C.drawReadyKuji(supplies(),NOW);
  const cov=C.computeCoverage(supplies(),catalog(),family(),NOW);
  k.percent=cov.percent; k.tier=C.readyKujiTier(cov.percent);
  // QA only: ?qa=1 -> each draw cycles through the 5 tiers (real data always yields 54% 中吉, so QA cannot reach other states otherwise). Users will not add ?qa=1, so production is unaffected.
  if(((typeof location!=='undefined'&&location.search)||'').indexOf('qa=1')>-1){
    const T=[['daidaikichi','🌟',95],['daikichi','✨',78],['chukichi','🍀',58],['shoukichi','🌱',40],['kichi','🌤',15]];
    const q=T[(_qaTierIdx++)%T.length]; k.tier={key:q[0],emoji:q[1],min:0}; k.percent=q[2];
  }
  const pool=kujiPool().filter(e=>e.luck===k.tier.key);
  const fb=pool.length?pool[Math.floor(Math.random()*pool.length)]:(kujiPool()[0]||null);
  const fbContent=_kujiStatic(fb);
  const el=document.getElementById('kuji');
  // AI-unavailable demo / offline / AI off -> go straight to the 20-slip deterministic fallback (synchronous, no network)
  if(state.aiUnavailDemo || !(state.aiEnabled && navigator.onLine)){
    el.innerHTML=renderKujiPoem(k,fbContent);applyRuby(el);el.classList.add('show');return;
  }
  // AI path: show loading first, then generate the fused result; on failure/timeout/use_fallback -> fall back to the 20 slips
  el.innerHTML=renderKujiLoading(k);el.classList.add('show');applyRuby(el);
  let content=fbContent;
  try{
    const r=await Promise.race([
      api('/api/generate-kuji','POST',{tier:k.tier.key,tier_label:(KUJI_TIER[k.tier.key]||{}).ja}),  // privacy: only sends the coarse tier, not full gaps/percent
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),18000))  // Safety cap; with thinking off it usually returns in ~3s, and the animation covers slower cases
    ]);
    const d=r&&r.data;
    if(d&&!d.use_fallback&&d.poem_ja){content={title_ja:d.title_ja||'',title_en:d.title_en||'',poem_ja:d.poem_ja,poem_en:d.poem_en,tip_ja:d.tip_ja,tip_en:d.tip_en,no:null,source:'ai'};}
  }catch(e){/* Any error -> use the fallback */}
  el.innerHTML=renderKujiPoem(k,content);applyRuby(el);
}

// Backbone: below the Lens result, attach deterministic local hard data. In a disaster context -> give only actionable info, no fortune draw, no readiness %.
function lensLocalData(){
  const ja=state.lang==='ja';const me=userLoc();const all=facilities();
  if(!all.length) return '';
  const nearestOf=(ty)=>C.nearestFacilities(me,all.filter(f=>f.type===ty))[0]||null;
  const sh=nearestOf('shelter');const wp=nearestOf('water_point');
  const dlNear=demoLocs().filter(d=>typeof d.elevation_m==='number').map(d=>({d,dist:Math.hypot((d.lat||0)-me.lat,(d.lng||0)-me.lng)})).sort((a,b)=>a.dist-b.dist)[0];
  const yourElev=dlNear?dlNear.d.elevation_m:null;
  const facRow=(p,ic,lbl)=>p?`<div class="lens-loc-row"><span class="lens-loc-ic">${ic}</span><span class="lens-loc-nm">${esc(lbl)}<span class="lens-loc-fac">${facNm(p.facility)}${facEn(p.facility)?` <span class="lens-loc-en">(${esc(facEn(p.facility))})</span>`:''}</span></span><span class="lens-loc-d">${esc(C.formatDistance(p.distance_m,state.lang))} · ${esc(C.compass8(C.bearingDeg(me,p.facility),state.lang))}</span></div>`:'';
  let rows='';
  rows+=facRow(sh,'🏢',ja?'一番（いちばん）近（ちか）い 避難所（ひなんじょ）・にげて 休（やす）める ところ':'Nearest shelter');
  rows+=facRow(wp,'💧',ja?'一番（いちばん）近（ちか）い 給水所（きゅうすいじょ）・水（みず）を もらえる ところ':'Nearest water');
  if(yourElev!=null) rows+=`<div class="lens-loc-row"><span class="lens-loc-ic">📏</span><span class="lens-loc-nm">${ja?'今（いま）いる 場所（ばしょ）の 海抜（かいばつ）':'Your elevation'}</span><span class="lens-loc-d">${yourElev} m</span></div>`;
  if(!rows) return '';
  rows+=genNote(isGenEn(sh&&sh.facility)||isGenEn(wp&&wp.facility));
  return `<div class="lens-local"><div class="lens-local-h">${ja?'📍 近（ちか）くの 支援点（しえんてん）':'📍 Support points near you'}</div>${rows}<div class="lens-local-note">${ja?'海抜（かいばつ）は 国土地理院（こくどちりいん）の データです。くわしくは ガイドを 見（み）て ください。':'Elevation data from GSI (T.P.). See Guide.'}</div></div>`;
}
// Backbone extension: when Lens identifies a 給水所/water context -> pull "water-related" items from stock as a bring reminder.
// 🔴 Boundary (no harm): only list "related items you already own" (name + quantity + storage location); ❌ do not judge sufficiency, ❌ do not show readiness %, ❌ do not compute how many to bring.
// A 給水所 is where you go to "fill up water" -> bring an "empty container" to fill, not the bottled drinking water you already have at home.
// So the match only takes "containers" (water_storage / foldable water bag types), ❌ excluding drinking water (rule=water).
const LENS_KIT_CONTEXT=[
  {test:/給水|飲料水|ポリタンク|water\s*(station|supply|point|distribution|tank)|drinking\s*water/i,
   match:(it)=>it.matched_rule_id==='water_storage'||/foldable|water\s*bag|water\s*carrier|jerry\s*can|ポリタンク|ウォーター?バッグ|給水袋|折(り)?たたみ/i.test((it.name_en||'')+' '+(it.name_ja||'')),
   h_en:'🎒 Bring an empty container to fill',
   h_ja:'🎒 給水所（きゅうすいじょ）へ 持（も）っていく 空（から）の 容器（ようき）'}
];
function lensBringFromKit(d){
  if(!d||d.use_fallback) return '';
  const ja=state.lang==='ja';
  const hay=[d.raw_ja,d.brain_ja,d.brain_en,d.action_ja,d.action_en].filter(Boolean).join(' ');
  const ctx=LENS_KIT_CONTEXT.find(c=>c.test.test(hay));
  if(!ctx) return '';
  const items=supplies().filter(ctx.match);
  if(!items.length) return '';
  const rows=items.map(it=>{
    const nm=ja?(it.name_ja||it.name_en||''):(it.name_en||it.name_ja||'');
    const qty=(it.quantity!=null)?(ja?`${it.quantity}個（こ）`:`${it.quantity} ${it.quantity===1?'item':'items'}`):'';
    const loc=it.storageLocation?esc(locDisp(it.storageLocation)):(ja?'場所（ばしょ）未設定（みせってい）':'Location not set');
    const meta=[esc(qty),loc].filter(Boolean).join(' · ');
    return `<div class="lens-kit-row"><span class="lens-kit-ic">📦</span><span class="lens-kit-nm">${esc(nm)}</span><span class="lens-kit-d">${meta}</span></div>`;
  }).join('');
  return `<div class="lens-kit"><div class="lens-kit-h">${ja?ctx.h_ja:ctx.h_en}</div>${rows}<div class="lens-kit-note">${ja?'安全（あんぜん）に 持（も）ち出（だ）せる ときだけ。数（かず）が 足（た）りるかは 判断（はんだん）しません。':'Bring only if it is safe and practical.'}</div></div>`;
}
